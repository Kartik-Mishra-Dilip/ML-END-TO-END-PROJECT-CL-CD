<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Exam Performance Indicator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f4f3fc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem 1rem;
      color: #1a1a2e;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(127,119,221,0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 600px;
    }

    .sepi-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 2rem;
    }

    .sepi-icon {
      width: 52px;
      height: 52px;
      background: #7F77DD;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .sepi-icon i { font-size: 24px; color: #fff; }

    .sepi-title {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 3px;
    }

    .sepi-sub {
      font-size: 13px;
      color: #888;
    }

    .progress-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 2rem;
    }

    .progress-seg {
      height: 4px;
      border-radius: 2px;
      flex: 1;
    }

    .progress-seg.done { background: #7F77DD; }
    .progress-seg.next { background: #AFA9EC; }
    .progress-seg.rest { background: #e0e0e0; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 12px;
    }

    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 1.5rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field label {
      font-size: 13px;
      color: #555;
      font-weight: 500;
    }

    .field select,
    .field input[type=number] {
      border-radius: 10px;
      border: 1px solid #e0dff7;
      background: #faf9ff;
      color: #1a1a2e;
      padding: 0 12px;
      height: 42px;
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      appearance: auto;
    }

    .field select:focus,
    .field input[type=number]:focus {
      border-color: #7F77DD;
      box-shadow: 0 0 0 3px rgba(127,119,221,0.15);
    }

    .divider {
      height: 1px;
      background: #f0eefc;
      margin: 0 0 1.5rem;
    }

    .score-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 1.5rem;
    }

    .score-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .score-field label {
      font-size: 13px;
      color: #555;
      font-weight: 500;
    }

    .score-input-wrap { position: relative; }

    .score-field input {
      border-radius: 10px;
      border: 1px solid #e0dff7;
      background: #faf9ff;
      color: #1a1a2e;
      padding: 0 42px 0 12px;
      height: 42px;
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .score-field input:focus {
      border-color: #7F77DD;
      box-shadow: 0 0 0 3px rgba(127,119,221,0.15);
    }

    .score-badge {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      color: #aaa;
      pointer-events: none;
    }

    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .pill {
      padding: 7px 18px;
      border-radius: 20px;
      border: 1px solid #e0dff7;
      font-size: 13px;
      color: #666;
      cursor: pointer;
      background: #faf9ff;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
      white-space: nowrap;
      font-family: inherit;
    }

    .pill.active {
      background: #EEEDFE;
      border-color: #AFA9EC;
      color: #3C3489;
      font-weight: 500;
    }

    .pill:hover:not(.active) {
      border-color: #AFA9EC;
      background: #f5f4fe;
    }

    .submit-btn {
      width: 100%;
      height: 46px;
      background: #7F77DD;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
    }

    .submit-btn:hover { background: #534AB7; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn i { font-size: 18px; }

    .result-box {
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      background: #f4f3fc;
      border-radius: 14px;
      border: 1px solid #e0dff7;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .result-icon {
      width: 44px;
      height: 44px;
      background: #E1F5EE;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .result-icon i { font-size: 20px; color: #0F6E56; }

    .result-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 3px;
    }

    .result-value {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a2e;
    }

    @media (max-width: 480px) {
      .fields-grid, .score-row { grid-template-columns: 1fr; }
      .card { padding: 1.5rem 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="sepi-header">
      <div class="sepi-icon">
        <i class="ti ti-school"></i>
      </div>
      <div>
        <div class="sepi-title">Student Exam Performance Indicator</div>
        <div class="sepi-sub">Fill in the details below to predict maths score</div>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-seg done"></div>
      <div class="progress-seg done"></div>
      <div class="progress-seg next"></div>
      <div class="progress-seg rest"></div>
    </div>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

      <p class="section-label">Personal details</p>
      <div class="fields-grid">
        <div class="field">
          <label for="gender">Gender</label>
          <select id="gender" name="gender" required>
            <option disabled selected value="">Select gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>
        <div class="field">
          <label for="ethnicity">Race / Ethnicity</label>
          <select id="ethnicity" name="ethnicity" required>
            <option disabled selected value="">Select group</option>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
          </select>
        </div>
      </div>

      <div class="divider"></div>

      <p class="section-label">Background</p>
      <div class="fields-grid">
        <div class="field">
          <label for="parent_edu">Parental education</label>
          <select id="parent_edu" name="parental_level_of_education" required>
            <option disabled selected value="">Select level</option>
            <option value="associate's degree">Associate's degree</option>
            <option value="bachelor's degree">Bachelor's degree</option>
            <option value="high school">High school</option>
            <option value="master's degree">Master's degree</option>
            <option value="some college">Some college</option>
            <option value="some high school">Some high school</option>
          </select>
        </div>
        <div class="field">
          <label for="lunch">Lunch type</label>
          <select id="lunch" name="lunch" required>
            <option disabled selected value="">Select type</option>
            <option value="free/reduced">Free / reduced</option>
            <option value="standard">Standard</option>
          </select>
        </div>
      </div>

      <div class="divider"></div>

      <p class="section-label">Test preparation</p>
      <div class="pill-row">
        <button type="button" class="pill" data-val="none" onclick="selectPill(this, 'test_preparation_course')">None</button>
        <button type="button" class="pill" data-val="completed" onclick="selectPill(this, 'test_preparation_course')">Completed</button>
      </div>
      <input type="hidden" name="test_preparation_course" id="test_preparation_course" required>

      <div class="divider"></div>

      <p class="section-label">Scores</p>
      <div class="score-row">
        <div class="score-field">
          <label for="reading_score">Reading score</label>
          <div class="score-input-wrap">
            <input type="number" id="reading_score" name="reading_score" placeholder="0 – 100" min="0" max="100" required>
            <span class="score-badge">/ 100</span>
          </div>
        </div>
        <div class="score-field">
          <label for="writing_score">Writing score</label>
          <div class="score-input-wrap">
            <input type="number" id="writing_score" name="writing_score" placeholder="0 – 100" min="0" max="100" required>
            <span class="score-badge">/ 100</span>
          </div>
        </div>
      </div>

      <button class="submit-btn" type="submit">
        <i class="ti ti-calculator"></i>
        Predict maths score
      </button>
    </form>

    <div class="result-box">
      <div class="result-icon">
        <i class="ti ti-chart-bar"></i>
      </div>
      <div>
        <div class="result-label">Predicted maths score</div>
        <div class="result-value">{{results}}</div>
      </div>
    </div>
  </div>

  <script>
    function selectPill(el, fieldName) {
      document.querySelectorAll('.pill-row .pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      document.getElementById(fieldName).value = el.dataset.val;
    }
  </script>
</body>
</html>
